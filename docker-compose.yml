version: '3.8'
services:
  app:
    build: .
    ports:
      - "3673:6547"
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: deploy_loader
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
